name: Security Scan

on:
  pull_request:
    branches: [main, prod]
  push:
    branches: [main, prod]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: v8.30.1
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION#v}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan working tree for secrets
        run: gitleaks dir . --verbose --redact
