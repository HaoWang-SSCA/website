name: Deploy Production Environment

on:
  push:
    branches: [prod]
    paths: ['src/**']
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'deploy')
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: |
          cd src
          dotnet restore SSCA.website.UI/SSCA_BC.csproj
          dotnet restore SSCA.website.API/SSCA.website.API.csproj

      - name: Build UI
        run: |
          cd src/SSCA.website.UI
          dotnet publish -c Release -o ../../output/wwwroot

      - name: Build API
        run: |
          cd src/SSCA.website.API
          dotnet publish -c Release -o ../../output/api

      - name: Verify API build output
        run: |
          echo "=== Checking .azurefunctions ==="
          ls -la output/api/.azurefunctions/
          echo "=== Checking functions.metadata ==="
          head -5 output/api/functions.metadata

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: output/
          include-hidden-files: true
          retention-days: 1

  deploy-swa:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy SWA (Production)
    environment: production
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: output/

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOY_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "output/wwwroot/wwwroot"
          skip_app_build: true
          skip_api_build: true

  deploy-api:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy Function App (Production)
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: output/

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get Function App Name
        id: get-fa
        run: |
          FA_NAME=$(az functionapp list --resource-group ssca-bc-prod-rg --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }} --query "[0].name" -o tsv)
          if [ -z "$FA_NAME" ]; then
            echo "::error::No Function App found in resource group ssca-bc-prod-rg"
            exit 1
          fi
          echo "Function App found: $FA_NAME"
          echo "name=$FA_NAME" >> $GITHUB_OUTPUT

      - name: Deploy Function App
        uses: Azure/functions-action@v1.5.2
        with:
          app-name: ${{ steps.get-fa.outputs.name }}
          package: output/api
          scm-do-build-during-deployment: 'false'
          enable-oryx-build: 'false'
